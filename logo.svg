<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <!-- Dark background gradient -->
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#1a1d23"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </radialGradient>

    <!-- Accent glow filter -->
    <filter id="glowYellow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowBlue" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Clip circle -->
    <clipPath id="circleClip">
      <circle cx="200" cy="200" r="188"/>
    </clipPath>
  </defs>

  <!-- Outer ring / border -->
  <circle cx="200" cy="200" r="195" fill="#0a0a0a" stroke="#e8ff00" stroke-width="2.5" opacity="0.9"/>

  <!-- Background fill -->
  <circle cx="200" cy="200" r="188" fill="url(#bgGlow)"/>

  <!-- Speed stripe lines clipped to circle -->
  <g clip-path="url(#circleClip)" opacity="0.08">
    <line x1="0" y1="155" x2="400" y2="130" stroke="#e8ff00" stroke-width="18"/>
    <line x1="0" y1="180" x2="400" y2="155" stroke="#e8ff00" stroke-width="8"/>
    <line x1="0" y1="250" x2="400" y2="225" stroke="#00c8ff" stroke-width="12"/>
    <line x1="0" y1="268" x2="400" y2="243" stroke="#00c8ff" stroke-width="5"/>
  </g>

  <!-- Checkered flag accent arc (top-right) -->
  <g clip-path="url(#circleClip)">
    <rect x="285" y="14" width="10" height="10" fill="#e8ff00" opacity="0.85"/>
    <rect x="295" y="14" width="10" height="10" fill="#0a0a0a" opacity="0.85"/>
    <rect x="305" y="14" width="10" height="10" fill="#e8ff00" opacity="0.85"/>
    <rect x="315" y="14" width="10" height="10" fill="#0a0a0a" opacity="0.85"/>
    <rect x="285" y="24" width="10" height="10" fill="#0a0a0a" opacity="0.85"/>
    <rect x="295" y="24" width="10" height="10" fill="#e8ff00" opacity="0.85"/>
    <rect x="305" y="24" width="10" height="10" fill="#0a0a0a" opacity="0.85"/>
    <rect x="315" y="24" width="10" height="10" fill="#e8ff00" opacity="0.85"/>
    <rect x="285" y="34" width="10" height="10" fill="#e8ff00" opacity="0.85"/>
    <rect x="295" y="34" width="10" height="10" fill="#0a0a0a" opacity="0.85"/>
    <rect x="305" y="34" width="10" height="10" fill="#e8ff00" opacity="0.85"/>
    <rect x="315" y="34" width="10" height="10" fill="#0a0a0a" opacity="0.85"/>
  </g>

  <!-- Steering wheel ring -->
  <circle cx="200" cy="178" r="64" fill="none" stroke="#2a2d35" stroke-width="16"/>
  <circle cx="200" cy="178" r="64" fill="none" stroke="#e8ff00" stroke-width="3" filter="url(#glowYellow)"
    stroke-dasharray="80 320" stroke-dashoffset="-90"/>
  <circle cx="200" cy="178" r="64" fill="none" stroke="#00c8ff" stroke-width="2"
    stroke-dasharray="50 350" stroke-dashoffset="110" filter="url(#glowBlue)"/>

  <!-- Steering wheel spokes -->
  <g stroke="#3a3d45" stroke-width="10" stroke-linecap="round">
    <!-- Left spoke -->
    <line x1="200" y1="178" x2="148" y2="195"/>
    <!-- Right spoke -->
    <line x1="200" y1="178" x2="252" y2="161"/>
    <!-- Bottom spoke -->
    <line x1="200" y1="178" x2="200" y2="240"/>
  </g>
  <!-- Spoke highlight -->
  <g stroke="#e8ff00" stroke-width="1.5" stroke-linecap="round" opacity="0.6">
    <line x1="200" y1="178" x2="148" y2="195"/>
    <line x1="200" y1="178" x2="252" y2="161"/>
    <line x1="200" y1="178" x2="200" y2="240"/>
  </g>

  <!-- Center hub -->
  <circle cx="200" cy="178" r="14" fill="#1a1d23" stroke="#e8ff00" stroke-width="2.5" filter="url(#softGlow)"/>
  <circle cx="200" cy="178" r="6" fill="#e8ff00"/>

  <!-- "REAL" wordmark -->
  <text
    x="200" y="296"
    font-family="'Arial Black', 'Impact', 'Haettenschweiler', sans-serif"
    font-weight="900"
    font-size="54"
    letter-spacing="8"
    fill="#f0f0f0"
    text-anchor="middle"
    dominant-baseline="auto"
  >REAL</text>

  <!-- "iRACING" wordmark accent -->
  <text
    x="200" y="342"
    font-family="'Arial Black', 'Impact', 'Haettenschweiler', sans-serif"
    font-weight="900"
    font-size="34"
    letter-spacing="10"
    fill="#e8ff00"
    text-anchor="middle"
    dominant-baseline="auto"
    filter="url(#glowYellow)"
  >iRACING</text>

  <!-- Thin separator line -->
  <line x1="100" y1="306" x2="300" y2="306" stroke="#2a2d35" stroke-width="1"/>

  <!-- Blue tagline dot accents -->
  <circle cx="108" cy="322" r="3" fill="#00c8ff" opacity="0.7"/>
  <circle cx="292" cy="322" r="3" fill="#00c8ff" opacity="0.7"/>

  <!-- Outer glow ring pulse -->
  <circle cx="200" cy="200" r="194" fill="none" stroke="#e8ff00" stroke-width="0.5" opacity="0.3"/>
</svg>
